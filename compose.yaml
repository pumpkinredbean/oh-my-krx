name: korea-market-data-hub

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
    ports:
      - "19092:19092"
      - "18082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "18123:8123"
      - "19000:9000"

  collector:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: python -m apps.collector.service
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      BOOTSTRAP_SERVERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      POLL_INTERVAL_SECONDS: 30
      PYTHONPATH: /app
      # hub-D: kxt websocket proxy policy (default=direct). See .env.example.
      KXT_KIS_WS_PROXY: ${KXT_KIS_WS_PROXY:-direct}
    ports:
      - "8001:8001"
    depends_on:
      redpanda:
        condition: service_healthy

  processor:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: python -m apps.processor.service
    env_file:
      - .env
    environment:
      APP_ENV: docker
      BOOTSTRAP_SERVERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      POLL_INTERVAL_SECONDS: 30
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_started

  api-web:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    command: uvicorn apps.api_web.app:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      BOOTSTRAP_SERVERS: redpanda:9092
      COLLECTOR_BASE_URL: http://collector:8001
      COMPOSE_PROJECT_NAME: korea-market-data-hub
      COLLECTOR_SERVICE_NAME: collector
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      collector:
        condition: service_started
